services:
  db:
    image: postgis/postgis:16-3.4
    container_name: prr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prr_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-public_risk_radar}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prr} -d ${POSTGRES_DB:-public_risk_radar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: prr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
